        query:
          page: "{page|1}"
          position: "{position|''}"
        response:
          content_type: text/html
          parse:
            headers:
              source: "table.references-table thead th"
              required: false
            rows:
              source: "table.references-table tbody tr"
              required: false
            empty_state:
              source: "text contains 'No packages!'"
              required: false
            placeholder_state:
              source: "first row contains 'Please select Flight or Container'"
              required: false
      - step: retry_with_container_filter_if_placeholder
        when: "{placeholder_state == true and position is provided}"
        method: GET
        path: "{page_path|/collector/packages}"
