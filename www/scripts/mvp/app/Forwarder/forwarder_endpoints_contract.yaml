common_endpoints:
  auth:
    login_get:
      method: GET
      path: /login
      params: {}
      response:
        content_type: text/html
        parse:
          csrf_or_xsrf_token: "input[name=_token] | meta[name=csrf-token]"
    login_post:
      method: POST
      path: /login
      params:
        username: string
        password: string
        _token: string
      response:
        content_type: "text/html (redirect) | application/json"
        parse:
          auth_ok: "redirect success | $.success"
          auth_error: "form error | $.message"
  api:
    check_position:
      method: POST
      path: /api/check-position
      json:
        container: string
      response:
        content_type: application/json
        parse:
          status: "$.status | $.data.status"
          position: "$.position | $.data.position"
          message: "$.message"
    check_package:
      method: POST
      path: /api/check-package
      json:
        track: string
        container: string
      response:
        content_type: application/json
        parse:
          package_status: "$.status | $.data.status"
          track: "$.track | $.data.track"
          events: "$.data.events[]"
